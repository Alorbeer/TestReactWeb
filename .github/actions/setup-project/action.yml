name: 'Projekt einrichten'
description: 'Node.js einrichten und Abhängigkeiten installieren'

runs:
  using: 'composite'
  steps:
    - name: Node.js einrichten
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Abhängigkeiten installieren
      run: npm ci
      shell: bash
