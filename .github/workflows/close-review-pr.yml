name: Review-PR schließen

on:
  pull_request_review:
    types: [submitted]
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      branch_name:
        required: true
        type: string

jobs:
  close-review-pr:
    name: Review-PR schließen und Einchecker benachrichtigen
    runs-on: ubuntu-latest
    # Nur für automatisch erstellte Review-PRs oder wenn direkt aufgerufen
    if: github.event_name == 'workflow_call' || contains(github.event.pull_request.labels.*.name, 'auto-review')

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Einchecker bei Anmerkungen benachrichtigen
        if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "⚠️ @${{ github.event.pull_request.user.login }} Copilot hat Anmerkungen zu deinem Push auf \`${{ github.event.pull_request.head.ref }}\` gefunden. Bitte prüfe die Review-Kommentare oben."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PR schließen (kein Merge)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_call' && inputs.pr_number || github.event.pull_request.number }}
          BRANCH: ${{ github.event_name == 'workflow_call' && inputs.branch_name || github.event.pull_request.head.ref }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_call" ]; then
            COMMENT="♻️ Wird durch neuen Review-PR für Commit \`${{ github.sha }}\` ersetzt."
          else
            COMMENT="🔒 Review abgeschlossen – PR wird automatisch geschlossen. Der Code verbleibt auf Branch \`${BRANCH}\`."
          fi
          gh pr close "${PR_NUMBER}" --comment "${COMMENT}"
