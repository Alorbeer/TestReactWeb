name: Review-PR erstellen

on:
  push:
    branches:
      - 'hotfix/**'
      - 'release/**'

jobs:
  create-review-pr:
    name: Temporären Review-PR erstellen
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Label sicherstellen
        run: |
          gh label create "auto-review" --color "0075ca" --description "Automatisch erstellter Review-PR" --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review-PR erstellen oder aktualisieren
        run: |
          TITLE="🤖 Auto-Review: ${{ github.ref_name }} (${{ github.sha }})"
          BODY="Automatischer Review-PR für Commit \`${{ github.sha }}\` von @${{ github.actor }}.

          > Dieser PR dient nur dem Code Review und wird nach dem Review automatisch geschlossen.
          > Der Code verbleibt auf Branch \`${{ github.ref_name }}\`."

          EXISTING_PR=$(gh pr list \
            --head "${{ github.ref_name }}" \
            --base main \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$EXISTING_PR" ]; then
            echo "Kein PR gefunden – erstelle neuen PR..."
            PR_URL=$(gh pr create \
              --title "$TITLE" \
              --body "$BODY" \
              --base main \
              --head "${{ github.ref_name }}" \
              --label "auto-review")
            EXISTING_PR=$(echo "$PR_URL" | grep -o '[0-9]*$')
          else
            echo "PR #$EXISTING_PR existiert bereits – aktualisiere..."
            gh pr edit "$EXISTING_PR" \
              --title "$TITLE" \
              --body "$BODY"
          fi

          echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copilot Review anfordern
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/requested_reviewers \
            --field 'reviewers[]=copilot-pull-request-reviewer'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}