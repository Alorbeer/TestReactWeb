name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Neue Versionsnummer (z.B. 1.2.3)'
        required: true
        type: string

jobs:
  test:
    name: Tests vor Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Tests ausführen
        uses: ./.github/actions/run-tests

  release:
    name: Version erhöhen & GitHub Release erstellen
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Version validieren
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Ungültige Versionsnummer '$VERSION'. Erwartet: MAJOR.MINOR.PATCH (z.B. 1.2.3)"
            exit 1
          fi
          CURRENT=$(node -p "require('./package.json').version")
          HIGHER=$(printf '%s\n%s' "$CURRENT" "$VERSION" | sort -V | tail -1)
          if [ "$HIGHER" != "$VERSION" ] || [ "$VERSION" = "$CURRENT" ]; then
            echo "::error::Version '$VERSION' muss größer als die aktuelle Version '$CURRENT' sein"
            exit 1
          fi
          echo "Versionsvalidierung OK: $VERSION > $CURRENT"

      - name: Projekt einrichten
        uses: ./.github/actions/setup-project

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version erhöhen
        id: version
        run: |
          npm version ${{ inputs.version }} -m "chore: release v%s"
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit & Tag pushen
        run: git push --follow-tags

      - name: GitHub Release erstellen
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "Release v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  deploy:
    name: GitHub Pages aktualisieren
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - id: pages
        name: Auf GitHub Pages veröffentlichen
        uses: ./.github/actions/deploy-pages
