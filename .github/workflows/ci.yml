name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Tests ausführen
        uses: ./.github/actions/run-tests

  deploy:
    name: GitHub Pages veröffentlichen
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}

    steps:
      - id: pages
        name: Auf GitHub Pages veröffentlichen
        uses: ./.github/actions/deploy-pages
